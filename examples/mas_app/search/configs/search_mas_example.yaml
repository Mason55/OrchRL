application:
  type: search
  max_turns: 4
  force_final_answer_on_max_turn: true

llm:
  # OpenAI official endpoint:
  # base_url: https://api.openai.com/v1
  # vLLM OpenAI-compatible endpoint:
  base_url: http://127.0.0.1:8000/v1
  api_key: ${OPENAI_API_KEY}
  timeout: 120
  max_retries: 3
  retry_backoff_sec: 1.0
  # Default model; can be overridden by each agent.
  model: /data1/lll/models/Qwen3-4B-Instruct-2507
  temperature: 0.6
  top_p: 0.95
  max_tokens: 1536

search:
  provider: http
  retrieval_service_url: http://127.0.0.1:8010/retrieve
  topk: 3
  return_scores: true
  timeout: 30
  max_retries: 3
  retry_backoff_sec: 1.0

agents:
  verifier:
    # Optional per-agent backend override. If omitted, inherit from top-level `llm`.
    llm:
      # base_url: http://127.0.0.1:8000/v1
      # api_key: ${OPENAI_API_KEY}
      # model: /data1/lll/models/Qwen3-4B-Instruct-2507
      # timeout: 120
      # max_retries: 3
      # retry_backoff_sec: 1.0
    temperature: 0.2
    top_p: 0.95
    max_tokens: 1024
  searcher:
    # Optional per-agent backend override.
    llm:
      # base_url: http://127.0.0.1:8001/v1
      # api_key: ${OPENAI_API_KEY}
      # model: /data1/lll/models/Qwen3-4B-Instruct-2507
      # timeout: 120
      # max_retries: 3
      # retry_backoff_sec: 1.0
    temperature: 0.6
    top_p: 0.95
    max_tokens: 1024
  answerer:
    # Optional per-agent backend override.
    llm:
      # base_url: http://127.0.0.1:8002/v1
      # api_key: ${OPENAI_API_KEY}
      # model: /data1/lll/models/Qwen3-4B-Instruct-2507
      # timeout: 120
      # max_retries: 3
      # retry_backoff_sec: 1.0
    temperature: 0.4
    top_p: 0.95
    max_tokens: 1536

data:
  input_path: ~/data/drmas_search_mas/test_sampled.parquet

output:
  prediction_path: ./outputs/search_predictions.jsonl
  report_path: ./outputs/search_report.json
  include_trace: true

validation:
  # false: exact match (EM), true: substring EM
  use_substring_em: false
