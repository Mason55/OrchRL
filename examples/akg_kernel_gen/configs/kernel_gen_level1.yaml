defaults:
- ppo_trainer@models.model_0.ppo_trainer_config: eval
- _self_

workflow_type: external_mas
specialization: full
lora_rank: 0
lora_alpha: 16

resource:
  nnodes: 1
  n_gpus_per_node: 8
  trust_remote_code: true

env:
  name: kernel_gen_env
  dataset: kernelbench_level1
  benchmark: kernelbench_level1
  multi_modal: false
  batched_init: true

agent_policy_configs:
  agent_configs:
    agent_0:
      name: kernel_gen
      policy_name: kernel_gen_model
      train_llm_config:
        enable_thinking: false
        temperature: 0.6
        top_p: 0.95
        top_k: 20
        min_p: 0.0
      val_llm_config:
        enable_thinking: false
        temperature: 0.0
        top_p: 1.0
        top_k: 20
        min_p: 0.0

base_models:
  policy_0:
    path: /data1/models/Qwen/Qwen3-4B-Instruct-2507
    name: kernel_gen_model

training:
  rollout_source: mate
  device: cuda
  total_training_steps: 20
  project_name: orchrl
  experiment_name: kernel_gen_level1_qwen3_4b
  logger:
  - console
  - wandb
  model_checkpoints_dir: checkpoints/kernel_gen_level1_qwen3_4b
  ray_wait_register_center_timeout: 300
  train_batch_size: 4
  train_sample_num: 4
  validate_sample_num: 1
  sample_temperature: 0.6
  val_freq: 9999
  max_prompt_length: 8192
  max_response_length: 6144
  lora_rank: ${lora_rank}
  lora_alpha: ${lora_alpha}
  mate:
    roles: [kernel_gen]
    role_policy_mapping:
      kernel_gen: kernel_gen_model
    batch_size: ${training.train_batch_size}
    n_samples_per_prompt: ${training.train_sample_num}
    max_concurrent_episodes: 4
    timeout: 180
    backend_timeout: 120
    credit_assignment: all_turns
    mas_work_dir: /data1/lmy/agentic-rl/OrchRL
    mas_command_template: >-
      python /data1/lmy/agentic-rl/OrchRL/examples/akg_kernel_gen/mas_entry/akg_rl_entry.py
      --config {config_path}
      --task {prompt}
    config_template_path: /data1/lmy/agentic-rl/OrchRL/examples/akg_kernel_gen/configs/akg_config_template.yaml
    prompt_loader:
      source_type: jsonl
      path: /data1/lmy/agentic-rl/OrchRL/data/kernelbench_level1.jsonl
      prompt_keys: [prompt, question, query, problem, input]
      expected_keys: [expected_answer, answer]
    reward:
      provider: orchrl.reward.kernel.kernel_gen_reward:compute_reward

models:
  model_0:
    path: /data1/models/Qwen/Qwen3-4B-Instruct-2507
    name: kernel_gen_model
    ppo_trainer_config:
      filter_method: uid
      filter_ratio: 0.0
      data:
        max_prompt_length: 8192
        max_response_length: 6144
        train_files: /data1/lmy/agentic-rl/OrchRL/data/kernelbench_level1.json
        val_files: /data1/lmy/agentic-rl/OrchRL/data/kernelbench_level1.json
        filter_overlong_prompts: false
      reward:
        num_workers: 1
        reward_manager:
          name: naive
          source: null
          module:
            path: null
            name: null
        custom_reward_function:
          path: null
          name: compute_score
      actor_rollout_ref:
        model:
          _target_: verl.workers.config.model.HFModelConfig
          path: /data1/models/Qwen/Qwen3-4B-Instruct-2507
        actor:
          ppo_mini_batch_size: 8
          ppo_micro_batch_size: null
          ppo_micro_batch_size_per_gpu: 1
          ppo_max_token_len_per_gpu: 14336
          fsdp_config:
            param_offload: true
            optimizer_offload: true
        ref:
          log_prob_micro_batch_size: null
          log_prob_micro_batch_size_per_gpu: 1
          log_prob_max_token_len_per_gpu: 14336
          fsdp_config:
            param_offload: true
        rollout:
          temperature: 0.6
          prompt_length: 8192
          response_length: 6144
          tensor_model_parallel_size: 1
          gpu_memory_utilization: 0.6
          max_model_len: 16384
          max_num_batched_tokens: 8192
          max_num_seqs: 16
          enforce_eager: true
          free_cache_engine: true
          log_prob_micro_batch_size: null
          log_prob_micro_batch_size_per_gpu: 1
          n_gpus_per_node: 8
        trainer:
          n_gpus_per_node: 8
          n_training_gpus_per_node: 8
